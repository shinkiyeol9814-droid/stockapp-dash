name: Broker Report Auto Batch

on:
  # 💡 깃허브 자체 크론은 지우고, 외부 API(repository_dispatch)를 열어줍니다!
  repository_dispatch:
    types: [run_report_batch] # 👈 cron-job.org에서 이 암구호를 외칠 겁니다.
  workflow_dispatch: # 수동 실행 버튼은 살려둡니다.

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'
          
      # 💡 [여기가 추가된 부분입니다!] 라이브러리 설치 과정
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY_A: ${{ secrets.GEMINI_API_KEY_A }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python batch_report.py
        
      # 💡 [추가] 분석 결과를 깃허브에 저장하는 로직도 잊지 마세요!
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto-update: Broker report & AI analysis" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
