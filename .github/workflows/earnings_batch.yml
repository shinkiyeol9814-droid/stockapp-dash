name: Earnings Screening Auto Batch

on:
  repository_dispatch:
    types: [run_earnings_batch] 
  workflow_dispatch:

# 💡 [핵심 추가] 두 개의 배치가 겹치지 않게 철벽 방어!
concurrency:
  group: "earnings-batch"
  cancel-in-progress: false # 돌고 있는 게 있으면 새 작업은 대기(skip)합니다.

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check batch enabled flag
        id: check_flag
        run: |
          CONFIG_FILE="data/earnings/batch_config.json"
          if [ -f "$CONFIG_FILE" ]; then
            ENABLED=$(python3 -c "import json; print(json.load(open('$CONFIG_FILE'))['enabled'])")
            if [ "$ENABLED" = "False" ]; then
              echo "🛑 배치가 OFF 상태입니다. 스킵합니다."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "✅ 배치가 ON 상태입니다. 실행합니다."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ 설정 파일 없음 — 기본 ON으로 실행합니다."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_flag.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        if: steps.check_flag.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        if: steps.check_flag.outputs.skip != 'true'
        env:
          # 💡 [포인트] 이 배치는 정규식을 쓰기 때문에 GEMINI_API_KEY가 필요 없습니다!
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python batch_earnings.py
        
      - name: Commit and Push
        if: steps.check_flag.outputs.skip != 'true'
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # 💡 실적 데이터 폴더만 콕 집어서 추가
          git add data/earnings/
          git commit -m "Auto-update: AWAKE Earnings data" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Ping Streamlit App (keep awake)
        if: always()
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" "https://stockapp-sky.streamlit.app/" || true
          curl -s -o /dev/null -w "%{http_code}\n" "https://stockapp-sky-dev.streamlit.app/" || true
